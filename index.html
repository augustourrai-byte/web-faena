<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Web Interna Faena</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">

function NotasPendientes() {
  const [casos, setCasos] = React.useState(() => {
    const guardados = localStorage.getItem("faena_bitacora_operativa");
    return guardados ? JSON.parse(guardados) : [];
  });

  const [vista, setVista] = React.useState("resumen");
  const [editandoId, setEditandoId] = React.useState(null);
  const [filtroResponsable, setFiltroResponsable] = React.useState("");
  const [busqueda, setBusqueda] = React.useState("");
  const [filtroKPI, setFiltroKPI] = React.useState("todos");

  const usuarioActual = "Augusto Urra";

  const formInicial = {
    fecha: new Date().toISOString().slice(0, 10),
    titulo: "",
    detalle: "",
    responsable: "",
    categoria: "Operacional",
    tipo: "Tema comercial",
    empresa: "",
    fecha_compromiso: "",
    monto: "",
    edp: "No",
    estado: "Abierto",
    semaforo: "Medio"
  };

  const [form, setForm] = React.useState(formInicial);

  React.useEffect(() => {
    localStorage.setItem("faena_bitacora_operativa", JSON.stringify(casos));
  }, [casos]);

  const hoy = new Date().toISOString().slice(0, 10);

  const estaVencido = (caso) =>
    caso.estado !== "Cerrado" && caso.fecha_compromiso && caso.fecha_compromiso < hoy;

  const proximoAVencer = (caso) => {
    if (!caso.fecha_compromiso || caso.estado === "Cerrado") return false;
    const diferencia = Math.ceil((new Date(caso.fecha_compromiso) - new Date(hoy)) / (1000 * 60 * 60 * 24));
    return diferencia >= 0 && diferencia <= 3;
  };

  const esCritico = (caso) =>
    estaVencido(caso) || caso.semaforo === "Alto" || proximoAVencer(caso);

  const prioridadCaso = (caso) => {
    if (estaVencido(caso) && caso.semaforo === "Alto") return 1;
    if (estaVencido(caso)) return 2;
    if (caso.semaforo === "Alto") return 3;
    if (proximoAVencer(caso)) return 4;
    if (caso.estado === "En gestión") return 5;
    return 9;
  };

  const paraCobrar = casos.filter(c => c.estado !== "Cerrado" && c.edp === "Si").length;
  const sinValidar = casos.filter(c => c.estado !== "Cerrado" && c.edp === "No").length;
  const riesgosAbiertos = casos.filter(c => c.estado !== "Cerrado" && c.semaforo === "Alto").length;
  const vencidos = casos.filter(estaVencido).length;
  const proximos = casos.filter(proximoAVencer).length;
  const impactoCosto = casos.filter(c => c.estado !== "Cerrado" && Number(c.monto || 0) > 0).length;
  const inicioSinCobro = casos.filter(c => c.estado !== "Cerrado" && c.tipo === "Servicio adicional" && c.edp === "No").length;

  const responsables = [...new Set(casos.map(c => c.responsable).filter(Boolean))];

  const pasaFiltros = (c) => {
    if (filtroResponsable && c.responsable !== filtroResponsable) return false;

    if (busqueda) {
      const texto = `${c.titulo || ""} ${c.detalle || ""} ${c.empresa || ""} ${c.responsable || ""} ${c.categoria || ""} ${c.tipo || ""}`.toLowerCase();
      if (!texto.includes(busqueda.toLowerCase())) return false;
    }

    if (filtroKPI === "paraCobrar") return c.estado !== "Cerrado" && c.edp === "Si";
    if (filtroKPI === "sinValidar") return c.estado !== "Cerrado" && c.edp === "No";
    if (filtroKPI === "riesgos") return c.estado !== "Cerrado" && c.semaforo === "Alto";
    if (filtroKPI === "vencidos") return estaVencido(c);
    if (filtroKPI === "proximos") return proximoAVencer(c);
    if (filtroKPI === "costo") return c.estado !== "Cerrado" && Number(c.monto || 0) > 0;
    if (filtroKPI === "sinCobro") return c.estado !== "Cerrado" && c.tipo === "Servicio adicional" && c.edp === "No";

    return true;
  };

  const casosAtencion = casos
    .filter(c => c.estado !== "Cerrado")
    .filter(c => c.estado !== "En gestión")
    .filter(esCritico)
    .filter(pasaFiltros)
    .sort((a, b) => prioridadCaso(a) - prioridadCaso(b));

  const casosGestion = casos
    .filter(c => c.estado === "En gestión")
    .filter(pasaFiltros)
    .sort((a, b) => prioridadCaso(a) - prioridadCaso(b));

  const casosHistorial = casos
    .filter(pasaFiltros)
    .sort((a, b) => prioridadCaso(a) - prioridadCaso(b));

  const activarKPI = (kpi) => {
    setFiltroKPI(kpi);
    setVista("resumen");
  };

  const limpiarFiltros = () => {
    setFiltroResponsable("");
    setBusqueda("");
    setFiltroKPI("todos");
  };

  const guardarCaso = () => {
    if (!form.titulo.trim()) {
      alert("Debes ingresar el título del caso.");
      return;
    }

    if (!form.responsable.trim()) {
      alert("Debes ingresar responsable.");
      return;
    }

    if (editandoId) {
      setCasos(casos.map(c => c.id === editandoId ? { ...form, id: editandoId } : c));
      setEditandoId(null);
    } else {
      setCasos([{ id: Date.now(), ...form }, ...casos]);
    }

    setForm(formInicial);
    setVista("resumen");
  };

  const editarCaso = (caso) => {
    setForm(caso);
    setEditandoId(caso.id);
    setVista("nuevo");
  };

  const eliminarCaso = (id) => {
    if (confirm("¿Eliminar este caso de la bitácora?")) {
      setCasos(casos.filter(c => c.id !== id));
    }
  };

  const marcarGestion = (id) => {
    setCasos(casos.map(c => c.id === id ? { ...c, estado: "En gestión" } : c));
  };

  const cerrarCaso = (id) => {
    setCasos(casos.map(c => c.id === id ? { ...c, estado: "Cerrado" } : c));
  };

  const reabrirCaso = (id) => {
    setCasos(casos.map(c => c.id === id ? { ...c, estado: "Abierto" } : c));
  };

  const vaciarTodo = () => {
    if (confirm("¿Seguro que deseas eliminar toda la bitácora?")) {
      setCasos([]);
    }
  };

  const exportarCSV = () => {
    const encabezados = ["Fecha", "Titulo", "Detalle", "Responsable", "Categoria", "Tipo", "Empresa", "Fecha compromiso", "Monto", "EDP", "Estado", "Semaforo"];
    const filas = casos.map(c => [c.fecha, c.titulo, c.detalle, c.responsable, c.categoria, c.tipo, c.empresa, c.fecha_compromiso, c.monto, c.edp, c.estado, c.semaforo]);

    const csv = [encabezados, ...filas]
      .map(fila => fila.map(valor => `"${String(valor || "").replaceAll('"', '""')}"`).join(";"))
      .join("\n");

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "bitacora_operativa.csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  const claseKPI = (id, base) =>
    `${base} rounded-xl p-4 text-left hover:shadow cursor-pointer ${filtroKPI === id ? "ring-2 ring-gray-900" : ""}`;

  return (
    <div className="space-y-6">

      <div className="flex justify-between items-start border-b pb-4">
        <div>
          <h1 className="text-2xl font-bold">Bitácora Operativa</h1>
          <p className="text-gray-600">Control personal de hechos, solicitudes, seguimiento, riesgos y cobro.</p>
        </div>

        <div className="flex gap-2 flex-wrap">
          <button onClick={() => setVista("resumen")} className={`px-4 py-2 rounded-lg border ${vista === "resumen" ? "bg-gray-900 text-white" : "bg-white"}`}>Resumen de atención</button>
          <button onClick={() => { setVista("nuevo"); setEditandoId(null); setForm(formInicial); }} className={`px-4 py-2 rounded-lg border ${vista === "nuevo" ? "bg-gray-900 text-white" : "bg-white"}`}>Nuevo ingreso</button>
          <button onClick={() => setVista("historial")} className={`px-4 py-2 rounded-lg border ${vista === "historial" ? "bg-gray-900 text-white" : "bg-white"}`}>Historial</button>
          <button onClick={() => setFiltroResponsable(usuarioActual)} className="px-4 py-2 rounded-lg border bg-blue-50 text-blue-800">Mis casos</button>
        </div>
      </div>

      <div className="flex gap-2 flex-wrap">
        <button onClick={exportarCSV} className="bg-white border px-4 py-2 rounded-lg hover:bg-gray-100">Exportar CSV</button>
        <button onClick={vaciarTodo} className="bg-red-50 text-red-700 border border-red-300 px-4 py-2 rounded-lg hover:bg-red-100">Vaciar todo</button>
      </div>

      {vista === "resumen" && (
        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow p-4">
            <h2 className="text-xl font-bold">Resumen de atención</h2>
            <p className="text-gray-600 mb-4">Haz click sobre un KPI para filtrar los casos asociados.</p>

            <div className="grid grid-cols-1 md:grid-cols-4 xl:grid-cols-7 gap-3">
              <button onClick={() => activarKPI("paraCobrar")} className={claseKPI("paraCobrar", "bg-green-50 border border-green-300")}><div className="text-sm">Para cobrar</div><div className="text-3xl font-bold">{paraCobrar}</div><div className="text-sm text-gray-600">Listos para EDP</div></button>
              <button onClick={() => activarKPI("sinValidar")} className={claseKPI("sinValidar", "bg-yellow-50 border border-yellow-300")}><div className="text-sm">Sin validar</div><div className="text-3xl font-bold">{sinValidar}</div><div className="text-sm text-gray-600">Ejecutados sin respaldo</div></button>
              <button onClick={() => activarKPI("riesgos")} className={claseKPI("riesgos", "bg-red-50 border border-red-300")}><div className="text-sm">Riesgos abiertos</div><div className="text-3xl font-bold">{riesgosAbiertos}</div><div className="text-sm text-gray-600">Impacto no cerrado</div></button>
              <button onClick={() => activarKPI("vencidos")} className={claseKPI("vencidos", "bg-gray-50 border border-gray-300")}><div className="text-sm">Vencidos</div><div className="text-3xl font-bold">{vencidos}</div><div className="text-sm text-gray-600">Fuera de plazo</div></button>
              <button onClick={() => activarKPI("proximos")} className={claseKPI("proximos", "bg-orange-50 border border-orange-300")}><div className="text-sm">Próximo a vencer</div><div className="text-3xl font-bold">{proximos}</div><div className="text-sm text-gray-600">Antes de 3 días</div></button>
              <button onClick={() => activarKPI("costo")} className={claseKPI("costo", "bg-blue-50 border border-blue-300")}><div className="text-sm">Impacto en costo</div><div className="text-3xl font-bold">{impactoCosto}</div><div className="text-sm text-gray-600">Movimientos abiertos</div></button>
              <button onClick={() => activarKPI("sinCobro")} className={claseKPI("sinCobro", "bg-purple-50 border border-purple-300")}><div className="text-sm">Inicio sin cobro</div><div className="text-3xl font-bold">{inicioSinCobro}</div><div className="text-sm text-gray-600">Falta cierre comercial</div></button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-4">
            <h2 className="text-xl font-bold">Filtros de gestión</h2>

            <div className="flex flex-wrap gap-2 mt-3">
              <input className="border rounded px-3 py-2" placeholder="Buscar..." value={busqueda} onChange={e => setBusqueda(e.target.value)} />

              <select className="border rounded px-3 py-2" value={filtroResponsable} onChange={e => setFiltroResponsable(e.target.value)}>
                <option value="">Todos los responsables</option>
                {responsables.map(r => <option key={r} value={r}>{r}</option>)}
              </select>

              <select className="border rounded px-3 py-2" value={filtroKPI} onChange={e => setFiltroKPI(e.target.value)}>
                <option value="todos">Todos los KPI</option>
                <option value="paraCobrar">Para cobrar</option>
                <option value="sinValidar">Sin validar</option>
                <option value="riesgos">Riesgos abiertos</option>
                <option value="vencidos">Vencidos</option>
                <option value="proximos">Próximo a vencer</option>
                <option value="costo">Impacto en costo</option>
                <option value="sinCobro">Inicio sin cobro</option>
              </select>

              <button onClick={limpiarFiltros} className="bg-gray-200 px-3 py-2 rounded">Limpiar filtros</button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-4">
            <h2 className="text-xl font-bold">Atención inmediata</h2>
            <p className="text-gray-600 mb-4">Casos críticos no gestionados: vencidos, próximos a vencer o con semáforo alto.</p>

            {casosAtencion.length === 0 && (
              <div className="text-center text-gray-500 p-6 border rounded-xl bg-green-50">
                No existen casos críticos sin gestión.
              </div>
            )}

            <div className="space-y-4">
              {casosAtencion.map(caso => (
                <div key={caso.id} className={`border rounded-xl p-4 ${estaVencido(caso) && caso.semaforo === "Alto" ? "bg-red-100 border-red-400" : estaVencido(caso) ? "bg-red-50 border-red-300" : "bg-gray-50"}`}>
                  <div className="flex justify-between gap-4">
                    <div className="flex-1">
                      <div className="flex flex-wrap gap-2 mb-3">
                        {estaVencido(caso) && <span className="bg-red-200 text-red-800 px-3 py-1 rounded-full text-xs font-semibold">Vencido</span>}
                        {proximoAVencer(caso) && <span className="bg-orange-100 px-3 py-1 rounded-full text-xs">Próximo a vencer</span>}

                        <span className={`px-3 py-1 rounded-full text-xs ${
                          caso.semaforo === "Alto" ? "bg-red-100 text-red-700" :
                          caso.semaforo === "Medio" ? "bg-yellow-100 text-yellow-700" :
                          "bg-green-100 text-green-700"
                        }`}>
                          Semáforo {caso.semaforo}
                        </span>

                        <span className="bg-white border px-3 py-1 rounded-full text-xs">{caso.tipo}</span>
                        <span className="bg-white border px-3 py-1 rounded-full text-xs">{caso.empresa || "Sin empresa"}</span>
                        <span className="bg-white border px-3 py-1 rounded-full text-xs">{caso.categoria}</span>
                      </div>

                      <h3 className="text-lg font-bold">{caso.titulo}</h3>

                      {estaVencido(caso) && <p className="text-sm mt-2 text-red-700"><b>Atención:</b> La fecha compromiso ya venció.</p>}

                      <div className="grid grid-cols-1 md:grid-cols-6 gap-3 mt-4 text-sm">
                        <div><b>Fecha:</b> {caso.fecha}</div>
                        <div><b>Estado:</b> {caso.estado}</div>
                        <div><b>Responsable:</b> {caso.responsable || "-"}</div>
                        <div><b>Compromiso:</b> {caso.fecha_compromiso || "-"}</div>
                        <div><b>Monto:</b> {caso.monto ? "$" + Number(caso.monto).toLocaleString("es-CL") : "-"}</div>
                        <div><b>EDP:</b> {caso.edp}</div>
                      </div>

                      {caso.detalle && <div className="mt-3 text-sm text-gray-700 whitespace-pre-wrap">{caso.detalle}</div>}
                    </div>

                    <div className="w-56 space-y-2">
                      <button onClick={() => marcarGestion(caso.id)} className="w-full bg-gray-900 text-white px-4 py-2 rounded-lg">Marcar en gestión</button>
                      <button onClick={() => editarCaso(caso)} className="w-full bg-white border px-4 py-2 rounded-lg">Editar</button>
                      <button onClick={() => cerrarCaso(caso.id)} className="w-full bg-white border px-4 py-2 rounded-lg">Cerrar caso</button>
                      <button onClick={() => eliminarCaso(caso.id)} className="w-full bg-red-600 text-white px-4 py-2 rounded-lg">Eliminar</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-4">
            <h2 className="text-xl font-bold">En gestión</h2>
            <p className="text-gray-600 mb-4">Casos tomados y pendientes de cierre.</p>

            {casosGestion.length === 0 && (
              <div className="text-center text-gray-500 p-6 border rounded-xl">
                No existen casos en gestión.
              </div>
            )}

            <div className="space-y-4">
              {casosGestion.map(caso => (
                <div key={caso.id} className="border rounded-xl p-4 bg-yellow-50 border-yellow-300">
                  <div className="flex justify-between gap-4">
                    <div className="flex-1">
                      <h3 className="text-lg font-bold">{caso.titulo}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mt-4 text-sm">
                        <div><b>Responsable:</b> {caso.responsable || "-"}</div>
                        <div><b>Compromiso:</b> {caso.fecha_compromiso || "-"}</div>
                        <div><b>Monto:</b> {caso.monto ? "$" + Number(caso.monto).toLocaleString("es-CL") : "-"}</div>
                        <div><b>EDP:</b> {caso.edp}</div>
                        <div><b>Semáforo:</b> {caso.semaforo}</div>
                      </div>
                      {caso.detalle && <div className="mt-3 text-sm text-gray-700 whitespace-pre-wrap">{caso.detalle}</div>}
                    </div>

                    <div className="w-56 space-y-2">
                      <button onClick={() => editarCaso(caso)} className="w-full bg-white border px-4 py-2 rounded-lg">Editar</button>
                      <button onClick={() => cerrarCaso(caso.id)} className="w-full bg-gray-900 text-white px-4 py-2 rounded-lg">Cerrar caso</button>
                      <button onClick={() => reabrirCaso(caso.id)} className="w-full bg-white border px-4 py-2 rounded-lg">Volver a abierto</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

        </div>
      )}

      {vista === "nuevo" && (
        <div className="bg-white rounded-xl shadow p-4">
          <h2 className="text-xl font-bold mb-4">{editandoId ? "Editar caso" : "Nuevo ingreso"}</h2>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

            <div>
              <label className="text-sm font-semibold">Fecha</label>
              <input type="date" className="w-full border rounded p-2" value={form.fecha} onChange={e => setForm({ ...form, fecha: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">Categoría</label>
              <select className="w-full border rounded p-2" value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
                <option>Operacional</option>
                <option>Food</option>
                <option>Facility</option>
                <option>Contratistas</option>
                <option>Mandante</option>
                <option>Labor</option>
                <option>Gastos</option>
                <option>Seguridad</option>
                <option>Calidad</option>
              </select>
            </div>

            <div>
              <label className="text-sm font-semibold">Responsable</label>
              <input className="w-full border rounded p-2" placeholder="Nombre responsable" value={form.responsable} onChange={e => setForm({ ...form, responsable: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">Tipo</label>
              <select className="w-full border rounded p-2" value={form.tipo} onChange={e => setForm({ ...form, tipo: e.target.value })}>
                <option>Tema comercial</option>
                <option>Servicio adicional</option>
                <option>Cobro</option>
                <option>EDP</option>
                <option>Exámenes</option>
                <option>Desviación operacional</option>
                <option>Riesgo costo</option>
                <option>Solicitud mandante</option>
              </select>
            </div>

            <div>
              <label className="text-sm font-semibold">Empresa / Área</label>
              <input className="w-full border rounded p-2" placeholder="Ej: Codelco, CML, Cine Inca" value={form.empresa} onChange={e => setForm({ ...form, empresa: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">Semáforo</label>
              <select className="w-full border rounded p-2" value={form.semaforo} onChange={e => setForm({ ...form, semaforo: e.target.value })}>
                <option>Alto</option>
                <option>Medio</option>
                <option>Bajo</option>
              </select>
            </div>

            <div className="md:col-span-2">
              <label className="text-sm font-semibold">Título / Tema</label>
              <input className="w-full border rounded p-2" placeholder="Ej: Ingresar EDP mes de febrero a SN" value={form.titulo} onChange={e => setForm({ ...form, titulo: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">Estado</label>
              <select className="w-full border rounded p-2" value={form.estado} onChange={e => setForm({ ...form, estado: e.target.value })}>
                <option>Abierto</option>
                <option>En gestión</option>
                <option>Cerrado</option>
              </select>
            </div>

            <div>
              <label className="text-sm font-semibold">Fecha compromiso</label>
              <input type="date" className="w-full border rounded p-2" value={form.fecha_compromiso} onChange={e => setForm({ ...form, fecha_compromiso: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">Monto</label>
              <input className="w-full border rounded p-2" placeholder="Ej: 2500000" value={form.monto} onChange={e => setForm({ ...form, monto: e.target.value })} />
            </div>

            <div>
              <label className="text-sm font-semibold">EDP</label>
              <select className="w-full border rounded p-2" value={form.edp} onChange={e => setForm({ ...form, edp: e.target.value })}>
                <option>No</option>
                <option>Si</option>
              </select>
            </div>

            <div className="md:col-span-3">
              <label className="text-sm font-semibold">Detalle</label>
              <textarea className="w-full border rounded p-2" rows="4" placeholder="Describe el hecho, solicitud, riesgo, compromiso o gestión pendiente..." value={form.detalle} onChange={e => setForm({ ...form, detalle: e.target.value })}></textarea>
            </div>

            <div className="md:col-span-3 flex gap-2">
              <button onClick={guardarCaso} className="bg-gray-900 text-white px-4 py-2 rounded-lg hover:bg-gray-700">{editandoId ? "Guardar cambios" : "Guardar caso"}</button>

      {vista === "historial" && (

                <th className="p-2 text-left">Título</th>
                <th className="p-2 text-left">Categoría</th>
                <th className="p-2 text-left">Tipo</th>
                <th className="p-2 text-left">Empresa</th>
                <th className="p-2 text-left">Responsable</th>
                <th className="p-2 text-left">Compromiso</th>
                <th className="p-2 text-left">Monto</th>
                <th className="p-2 text-left">EDP</th>
                <th className="p-2 text-left">Estado</th>
                <th className="p-2 text-left">Acción</th>

            <tbody>

                <tr><td colSpan="11" className="p-4 text-center text-gray-500">No existen registros con los filtros actuales.</td></tr>
              )}

              {casosHistorial.map(caso => (
                <tr key={caso.id} className="border-t">
                  <td className="p-2">{caso.fecha}</td>
                  <td className="p-2 font-semibold">{caso.titulo}</td>
                  <td className="p-2">{caso.categoria}</td>
                  <td className="p-2">{caso.tipo}</td>
                  <td className="p-2">{caso.empresa}</td>
                  <td className="p-2">{caso.responsable}</td>
                  <td className="p-2">{caso.fecha_compromiso}</td>
                  <td className="p-2">{caso.monto ? "$" + Number(caso.monto).toLocaleString("es-CL") : "-"}</td>
                  <td className="p-2">{caso.edp}</td>
                  <td className="p-2">{caso.estado}</td>
                  <td className="p-2 flex gap-2 flex-wrap">
                    <button onClick={() => editarCaso(caso)} className="bg-white border px-3 py-1 rounded">Editar</button>
                    {caso.estado !== "Cerrado" ? (
                      <button onClick={() => cerrarCaso(caso.id)} className="bg-gray-900 text-white px-3 py-1 rounded">Cerrar</button>
                    ) : (
                      <button onClick={() => reabrirCaso(caso.id)} className="bg-white border px-3 py-1 rounded">Reabrir</button>
                    )}
                    <button onClick={() => eliminarCaso(caso.id)} className="bg-red-600 text-white px-3 py-1 rounded">Eliminar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

    </div>
  );
}

function FoodCostDesviaciones() {

  const STORAGE_KEY = "faena_food_cost_v3";

  const [data, setData] = React.useState(() => {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : [];
  });

  const [form, setForm] = React.useState({
    fecha: new Date().toISOString().slice(0,10),
    casino: "",
    servicio: "",
    r_plan: "",
    r_real: "",
    precosto: "",
    imp_real: "",
    precio_venta: ""
  });

  React.useEffect(()=>{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },[data]);

  const n = (v) => Number(String(v||"0").replace(/\./g,""));

  const calc = (r) => {

    const rp = n(r.r_plan);
    const rr = n(r.r_real);
    const pre = n(r.precosto);
    const imp = n(r.imp_real);
    const pv = n(r.precio_venta);

    // Ventas automáticas
    const ventaPlan = rp * pv;
    const ventaReal = rr * pv;

    // Costos
    const costoPlan = rp * pre;
    const costoReal = rr * imp;

    // Impactos
    const impactoVol = (rr - rp) * pre;
    const impactoPrecio = (imp - pre) * rr;
    const impactoTotal = costoReal - costoPlan;

    // FC
    const fcPlan = ventaPlan > 0 ? (costoPlan / ventaPlan) * 100 : 0;
    const fcReal = ventaReal > 0 ? (costoReal / ventaReal) * 100 : 0;

    // Estado
    let estado = "Controlado";
    if (impactoTotal > 500000) estado = "Crítico";
    else if (impactoTotal > 150000) estado = "Alerta";

    return {
      rp, rr, pre, imp, pv,
      ventaPlan, ventaReal,
      costoPlan, costoReal,
      impactoVol, impactoPrecio, impactoTotal,
      fcPlan, fcReal,
      estado
    };
  };

  const add = () => {
    setData([{ id: Date.now(), ...form }, ...data]);
  };

  const remove = (id) => {
    if(confirm("Eliminar registro?")){
      setData(data.filter(x => x.id !== id));
    }
  };

  const enviar = (r) => {
    const c = calc(r);

    const caso = {
      id: Date.now(),
      fecha: new Date().toISOString().slice(0,10),
      titulo: `Desviación FC - ${r.servicio} ${r.casino}`,
      detalle:
`Raciones Plan: ${c.rp}
Raciones Real: ${c.rr}

PreCosto: ${c.pre}
IMP Real: ${c.imp}

Impacto Volumen: $${c.impactoVol.toLocaleString("es-CL")}
Impacto Precio: $${c.impactoPrecio.toLocaleString("es-CL")}
Impacto Total: $${c.impactoTotal.toLocaleString("es-CL")}

FC Plan: ${c.fcPlan.toFixed(2)}%
FC Real: ${c.fcReal.toFixed(2)}%`,
      responsable: "Augusto Urra",
      categoria: "Food",
      tipo: "Desviación FC",
      empresa: r.casino,
      estado: "Abierto",
      semaforo: c.estado === "Crítico" ? "Alto" : "Medio"
    };

    const ex = JSON.parse(localStorage.getItem("faena_bitacora_operativa") || "[]");
    localStorage.setItem("faena_bitacora_operativa", JSON.stringify([caso,...ex]));

    alert("Enviado a bitácora");
  };

  const resumen = data.map(d => calc(d));

  const totalImpacto = resumen.reduce((a,b)=>a+b.impactoTotal,0);
  const totalVol = resumen.reduce((a,b)=>a+b.impactoVol,0);
  const totalPrecio = resumen.reduce((a,b)=>a+b.impactoPrecio,0);

  return (
    <div className="space-y-6">

      <h1 className="text-2xl font-bold">Food Cost - Análisis Diario</h1>

      <div className="grid grid-cols-4 gap-4">

        <div className="bg-white p-4 rounded shadow">
          <div>Impacto Total</div>
          <div className="text-2xl font-bold text-red-600">${totalImpacto.toLocaleString("es-CL")}</div>
        </div>

        <div className="bg-white p-4 rounded shadow">
          <div>Impacto Volumen</div>
          <div>${totalVol.toLocaleString("es-CL")}</div>
        </div>

        <div className="bg-white p-4 rounded shadow">
          <div>Impacto Precio</div>
          <div>${totalPrecio.toLocaleString("es-CL")}</div>
        </div>

        <div className="bg-white p-4 rounded shadow">
          <div>Registros</div>
          <div>{data.length}</div>
        </div>

      </div>

      <div className="bg-white p-4 rounded shadow space-y-2">

        <h2 className="font-bold">Ingreso</h2>

        <div className="grid grid-cols-4 gap-2">

          <input placeholder="Casino" onChange={e=>setForm({...form,casino:e.target.value})}/>
          <input placeholder="Servicio" onChange={e=>setForm({...form,servicio:e.target.value})}/>
          <input placeholder="Rac Plan" onChange={e=>setForm({...form,r_plan:e.target.value})}/>
          <input placeholder="Rac Real" onChange={e=>setForm({...form,r_real:e.target.value})}/>
          <input placeholder="PreCosto" onChange={e=>setForm({...form,precosto:e.target.value})}/>
          <input placeholder="IMP Real" onChange={e=>setForm({...form,imp_real:e.target.value})}/>
          <input placeholder="Precio Venta" onChange={e=>setForm({...form,precio_venta:e.target.value})}/>

        </div>

        <button onClick={add} className="bg-black text-white px-4 py-2">Agregar</button>

      </div>

      <table className="w-full text-sm bg-white rounded shadow">
        <thead className="bg-gray-200">
          <tr>
            <th>Fecha</th>
            <th>Servicio</th>
            <th>Casino</th>
            <th>Venta</th>
            <th>FC</th>
            <th>Impacto</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>

        <tbody>
          {data.map(r=>{
            const c = calc(r);
            return (
              <tr key={r.id} className="border-t">
                <td>{r.fecha}</td>
                <td>{r.servicio}</td>
                <td>{r.casino}</td>
                <td>${c.ventaReal.toLocaleString("es-CL")}</td>
                <td>{c.fcReal.toFixed(2)}%</td>
                <td className="text-red-600 font-bold">${c.impactoTotal.toLocaleString("es-CL")}</td>
                <td>{c.estado}</td>
                <td className="flex gap-2">
                  <button onClick={()=>enviar(r)} className="bg-black text-white px-2">Bitácora</button>
                  <button onClick={()=>remove(r.id)} className="bg-red-500 text-white px-2">X</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

    </div>
  );
}
