<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Web Interna Faena</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">

function NotasPendientes() {
  const [casos, setCasos] = React.useState(() => {
    const guardados = localStorage.getItem("faena_bitacora_operativa");
    return guardados ? JSON.parse(guardados) : [];
  });

  const [vista, setVista] = React.useState("resumen");
  const [editandoId, setEditandoId] = React.useState(null);
  const [filtroResponsable, setFiltroResponsable] = React.useState("");
  const [busqueda, setBusqueda] = React.useState("");

  const usuario = "Augusto Urra";

  const formInicial = {
    fecha: new Date().toISOString().slice(0, 10),
    titulo: "",
    detalle: "",
    responsable: "",
    categoria: "Operacional",
    tipo: "Tema comercial",
    empresa: "",
    fecha_compromiso: "",
    monto: "",
    edp: "No",
    estado: "Abierto",
    semaforo: "Medio"
  };

  const [form, setForm] = React.useState(formInicial);

  React.useEffect(() => {
    localStorage.setItem("faena_bitacora_operativa", JSON.stringify(casos));
  }, [casos]);

  const hoy = new Date().toISOString().slice(0, 10);

  const estaVencido = (c) =>
    c.estado !== "Cerrado" && c.fecha_compromiso && c.fecha_compromiso < hoy;

  const proximoAVencer = (c) => {
    if (!c.fecha_compromiso || c.estado === "Cerrado") return false;
    const diff = Math.ceil((new Date(c.fecha_compromiso) - new Date(hoy)) / (1000 * 60 * 60 * 24));
    return diff >= 0 && diff <= 3;
  };

  const esCritico = (c) =>
    estaVencido(c) || c.semaforo === "Alto" || proximoAVencer(c);

  const responsables = [...new Set(casos.map(c => c.responsable).filter(Boolean))];

  const filtrarTexto = (c) => {
    if (!busqueda) return true;
    const texto = `${c.titulo} ${c.detalle} ${c.empresa} ${c.responsable}`.toLowerCase();
    return texto.includes(busqueda.toLowerCase());
  };

  const filtrarResponsable = (c) => {
    if (!filtroResponsable) return true;
    return c.responsable === filtroResponsable;
  };

  const casosUrgentes = casos.filter(c =>
    c.estado !== "Cerrado" &&
    esCritico(c) &&
    c.estado !== "En gestión" &&
    filtrarTexto(c) &&
    filtrarResponsable(c)
  );

  const casosGestion = casos.filter(c =>
    c.estado === "En gestión" &&
    filtrarTexto(c) &&
    filtrarResponsable(c)
  );

  const guardarCaso = () => {
    if (!form.titulo.trim()) return alert("Falta título");

    if (editandoId) {
      setCasos(casos.map(c => c.id === editandoId ? { ...form, id: editandoId } : c));
    } else {
      setCasos([{ id: Date.now(), ...form }, ...casos]);
    }

    setEditandoId(null);
    setForm(formInicial);
    setVista("resumen");
  };

  const marcarGestion = (id) => {
    setCasos(casos.map(c => c.id === id ? { ...c, estado: "En gestión" } : c));
  };

  const cerrarCaso = (id) => {
    setCasos(casos.map(c => c.id === id ? { ...c, estado: "Cerrado" } : c));
  };

  return (
    <div className="space-y-6">

      <div className="flex justify-between">
        <h1 className="text-2xl font-bold">Bitácora Operativa</h1>

        <div className="flex gap-2">
          <button onClick={() => setVista("resumen")} className="px-3 py-2 bg-gray-900 text-white rounded">Resumen</button>
          <button onClick={() => setVista("nuevo")} className="px-3 py-2 border rounded">Nuevo</button>
          <button onClick={() => setFiltroResponsable(usuario)} className="px-3 py-2 bg-blue-100 rounded">Mis casos</button>
        </div>
      </div>

      {vista === "resumen" && (
        <>
          <div className="flex gap-2">
            <input
              placeholder="Buscar..."
              className="border px-3 py-2 rounded"
              value={busqueda}
              onChange={e => setBusqueda(e.target.value)}
            />

            <select
              className="border px-3 py-2 rounded"
              value={filtroResponsable}
              onChange={e => setFiltroResponsable(e.target.value)}
            >
              <option value="">Todos</option>
              {responsables.map(r => <option key={r}>{r}</option>)}
            </select>

            <button onClick={() => { setBusqueda(""); setFiltroResponsable(""); }} className="px-3 py-2 bg-gray-200 rounded">
              Limpiar
            </button>
          </div>

          {/* 🔴 URGENTE */}
          <div>
            <h2 className="text-xl font-bold mb-2">🔴 Atención inmediata</h2>

            {casosUrgentes.length === 0 && (
              <div className="p-4 bg-green-50 border rounded">Sin casos críticos</div>
            )}

            {casosUrgentes.map(c => (
              <div key={c.id} className="p-4 border rounded mb-3 bg-red-50">

                <div className="font-bold">{c.titulo}</div>

                {estaVencido(c) && (
                  <div className="text-red-700 text-sm">⚠ Vencido</div>
                )}

                <div className="text-sm mt-2">
                  {c.responsable} | {c.fecha_compromiso} | ${Number(c.monto || 0).toLocaleString()}
                </div>

                <div className="flex gap-2 mt-3">
                  <button onClick={() => marcarGestion(c.id)} className="bg-gray-900 text-white px-3 py-1 rounded">
                    Gestionar
                  </button>

                  <button onClick={() => cerrarCaso(c.id)} className="border px-3 py-1 rounded">
                    Cerrar
                  </button>
                </div>

              </div>
            ))}
          </div>

          {/* 🟡 EN GESTIÓN */}
          <div>
            <h2 className="text-xl font-bold mb-2">🟡 En gestión</h2>

            {casosGestion.length === 0 && (
              <div className="p-4 bg-gray-100 border rounded">Sin casos en gestión</div>
            )}

            {casosGestion.map(c => (
              <div key={c.id} className="p-4 border rounded mb-3">

                <div className="font-bold">{c.titulo}</div>

                <div className="text-sm mt-2">
                  {c.responsable} | {c.fecha_compromiso}
                </div>

                <button onClick={() => cerrarCaso(c.id)} className="mt-3 border px-3 py-1 rounded">
                  Cerrar
                </button>

              </div>
            ))}
          </div>
        </>
      )}

      {vista === "nuevo" && (
        <div className="bg-white p-4 rounded shadow">
          <input
            className="border p-2 w-full mb-2"
            placeholder="Título"
            value={form.titulo}
            onChange={e => setForm({ ...form, titulo: e.target.value })}
          />

          <input
            className="border p-2 w-full mb-2"
            placeholder="Responsable"
            value={form.responsable}
            onChange={e => setForm({ ...form, responsable: e.target.value })}
          />

          <input
            type="date"
            className="border p-2 w-full mb-2"
            value={form.fecha_compromiso}
            onChange={e => setForm({ ...form, fecha_compromiso: e.target.value })}
          />

          <select
            className="border p-2 w-full mb-2"
            value={form.semaforo}
            onChange={e => setForm({ ...form, semaforo: e.target.value })}
          >
            <option>Alto</option>
            <option>Medio</option>
            <option>Bajo</option>
          </select>

          <button onClick={guardarCaso} className="bg-gray-900 text-white px-4 py-2 rounded">
            Guardar
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = React.useState("dashboard");

  const renderContent = () => {
    switch (view) {
      case "dashboard":
        return <h1 className="text-2xl font-bold">Dashboard General</h1>;
      case "notas":
        return <NotasPendientes />;
      case "desviaciones":
        return <h1 className="text-2xl font-bold">Food Cost - Desviaciones</h1>;
      case "raciones":
        return <h1 className="text-2xl font-bold">Control de Raciones</h1>;
      case "edp":
        return <h1 className="text-2xl font-bold">HTML de EDP</h1>;
      case "devoluciones":
        return <h1 className="text-2xl font-bold">Devoluciones</h1>;
      case "status":
        return <h1 className="text-2xl font-bold">Status EDP</h1>;
      case "dotaciones":
        return <h1 className="text-2xl font-bold">Control de Dotaciones</h1>;
      case "gastos":
        return <h1 className="text-2xl font-bold">Control de Gastos</h1>;
      default:
        return <h1>Selecciona una opción</h1>;
    }
  };

  return (
    <div className="flex h-screen">
      <div className="w-64 bg-gray-900 text-white p-4 space-y-2">
        <h2 className="text-xl font-bold mb-4">FAENA</h2>

        <button onClick={() => setView("dashboard")} className="w-full text-left hover:bg-gray-700 p-2 rounded">📊 Dashboard</button>

        <div className="mt-4 text-gray-400 text-sm">RESUMEN</div>
        <button onClick={() => setView("notas")} className="w-full text-left hover:bg-gray-700 p-2 rounded">📝 Notas / Pendientes</button>

        <div className="mt-4 text-gray-400 text-sm">FOOD COST</div>
        <button onClick={() => setView("desviaciones")} className="w-full text-left hover:bg-gray-700 p-2 rounded">📉 Desviaciones</button>

        <div className="mt-4 text-gray-400 text-sm">CONTRATISTAS</div>
        <button onClick={() => setView("raciones")} className="w-full text-left hover:bg-gray-700 p-2 rounded">🍽️ Control de Raciones</button>
        <button onClick={() => setView("edp")} className="w-full text-left hover:bg-gray-700 p-2 rounded">📄 HTML de EDP</button>

        <div className="mt-4 text-gray-400 text-sm">MANDANTE</div>
        <button onClick={() => setView("devoluciones")} className="w-full text-left hover:bg-gray-700 p-2 rounded">💰 Devoluciones</button>
        <button onClick={() => setView("status")} className="w-full text-left hover:bg-gray-700 p-2 rounded">📌 Status EDP</button>

        <div className="mt-4 text-gray-400 text-sm">LABOR</div>
        <button onClick={() => setView("dotaciones")} className="w-full text-left hover:bg-gray-700 p-2 rounded">👷 Dotaciones</button>

        <div className="mt-4 text-gray-400 text-sm">GASTOS</div>
        <button onClick={() => setView("gastos")} className="w-full text-left hover:bg-gray-700 p-2 rounded">💸 Gastos</button>
      </div>

      <div className="flex-1 p-6 overflow-auto">
        {renderContent()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
