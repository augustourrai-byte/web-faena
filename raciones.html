<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Operacional de Raciones</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --bg:#f1f5f9;
      --panel:#ffffff;
      --line:#e2e8f0;
      --text:#0f172a;
      --muted:#64748b;
      --dark:#0f172a;
      --dark2:#1e293b;
      --primary:#2563eb;
      --success:#059669;
      --danger:#dc2626;
      --warning:#d97706;
      --radius:1.25rem;
      --shadow:0 10px 30px rgba(15,23,42,.05);
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .matrix-top-scroll{
      overflow-x:auto;
      overflow-y:hidden;
      height:16px;
    }

    .matrix-top-scroll > div{
      height:1px;
    }

    .matrix-wrap{
      overflow:auto;
      max-height:62vh;
      border:1px solid var(--line);
      border-radius:1rem;
      background:#fff;
    }

    .matrix{
      border-collapse:separate;
      border-spacing:0;
      min-width:max-content;
      width:max-content;
    }

    .matrix th, .matrix td{
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      padding:10px 12px;
      font-size:14px;
      white-space:nowrap;
    }

    .matrix th{
      position:sticky;
      top:0;
      z-index:20;
      background:#f8fafc;
      font-weight:700;
    }

    .matrix .sticky-col{
      position:sticky;
      left:0;
      background:#fff;
      z-index:10;
    }

    .matrix th.sticky-col{
      z-index:30;
      background:#f8fafc;
    }

    .matrix tr:hover td{
      background:#fafcff;
    }

    .tree-cell{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:360px;
    }

    .toggle-btn{
      width:24px;
      height:24px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      background:#fff;
      font-weight:700;
      cursor:pointer;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .badge-gray{ background:#f1f5f9; color:#475569; }
    .badge-blue{ background:#eff6ff; color:#1d4ed8; }
    .badge-green{ background:#ecfdf5; color:#047857; }
    .badge-red{ background:#fef2f2; color:#b91c1c; }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:1rem;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid var(--line);
      font-size:14px;
    }

    thead th{
      background:#f8fafc;
      text-align:left;
      font-size:12px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .notice{
      margin-top:1rem;
      padding:.9rem 1rem;
      border-radius:1rem;
      border:1px solid var(--line);
      background:#f8fafc;
      color:#334155;
      font-size:14px;
    }

    .notice.success{
      border-color:#a7f3d0;
      background:#ecfdf5;
      color:#065f46;
    }

    .notice.danger{
      border-color:#fecaca;
      background:#fef2f2;
      color:#991b1b;
    }

    .empty{
      padding:2rem;
      text-align:center;
      color:var(--muted);
    }

    .hidden{ display:none !important; }

    @media (max-width: 1100px){
      .layout-main{
        grid-template-columns:1fr !important;
      }

      aside.sidebar{
        position:relative !important;
        height:auto !important;
      }
    }
  </style>
</head>
<body>

<div class="min-h-screen grid layout-main" style="grid-template-columns:290px 1fr;">
  <aside class="sidebar bg-slate-950 text-white p-5 overflow-auto" style="position:sticky;top:0;height:100vh;">
    <div class="pb-5 border-b border-slate-800">
      <h1 class="text-2xl font-extrabold">Control Raciones</h1>
      <p class="text-slate-400 text-sm mt-1">Faena minera · operacional · contractual</p>
    </div>

    <div class="mt-4 space-y-3">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <label class="block text-xs text-slate-400 mb-1">Perfil</label>
        <select id="perfilSelector" class="w-full rounded-xl px-3 py-2 text-slate-900">
          <option value="ADMIN">Administrador</option>
          <option value="SUPERVISOR">Supervisor</option>
        </select>
      </div>

      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <label class="block text-xs text-slate-400 mb-1">Período activo</label>
        <input id="periodoSelector" type="month" class="w-full rounded-xl px-3 py-2 text-slate-900" />
      </div>

      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 space-y-2">
        <label class="block text-xs text-slate-400">Turno de análisis</label>
        <select id="turnoFiltroGlobal" class="w-full rounded-xl px-3 py-2 text-slate-900"></select>

        <label class="block text-xs text-slate-400 mt-3">Permutas</label>
        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" id="chkAgruparPermutas" class="rounded">
          Agrupar como COLACION TERRENO
        </label>
      </div>
    </div>

    <nav id="menu" class="mt-5 space-y-2"></nav>

    <div class="mt-5 rounded-2xl border border-slate-800 bg-slate-900/70 p-4 space-y-2">
      <button id="btnExportCurrentExcel" class="w-full rounded-xl bg-white text-slate-900 px-4 py-2 font-semibold">Excel actual</button>
      <button id="btnExportDetailExcel" class="w-full rounded-xl bg-slate-800 text-white px-4 py-2 font-semibold">Excel detalle</button>
      <button id="btnExportPDF" class="w-full rounded-xl bg-slate-800 text-white px-4 py-2 font-semibold">PDF visible</button>
      <button id="btnReset" class="w-full rounded-xl bg-rose-700 text-white px-4 py-2 font-semibold">Reset local</button>
    </div>
  </aside>

  <main class="p-6 md:p-8 space-y-5 min-w-0">
    <div class="flex items-start justify-between gap-4 flex-wrap">
      <div>
        <h2 id="pageTitle" class="text-5xl font-light tracking-tight">Dashboard</h2>
        <p id="pageSubtitle" class="text-slate-500 text-xl mt-2">Resumen del período.</p>
      </div>

      <div class="flex gap-3 flex-wrap items-center text-sm font-bold">
        <span class="badge badge-gray" id="perfilTag">ADMINISTRADOR</span>
        <span class="badge badge-blue" id="periodoTag"></span>
        <span class="badge badge-gray" id="turnoTag">TURNO: TODOS</span>
      </div>
    </div>

    <div id="appContent"></div>
  </main>
</div>

<datalist id="empresasList"></datalist>
<datalist id="serviciosList"></datalist>

<script>
/* =========================
   CONFIG
========================= */
const DB_NAME = "control_raciones_curva_diaria_v1";
const DB_VERSION = 1;
const DB_STORE = "main_store";
const DB_KEY = "app_data";

const SETTINGS_KEY = "control_raciones_curva_diaria_settings";
const TURNOS_KEY = "control_raciones_curva_diaria_turnos";

const MENU_ITEMS = [
  { key:"dashboard", label:"Dashboard", roles:["ADMIN"] },
  { key:"supervisores", label:"Venta supervisores", roles:["ADMIN","SUPERVISOR"] },
  { key:"produccion", label:"Producción", roles:["ADMIN"] },
  { key:"sistema", label:"Venta sistema", roles:["ADMIN"] },
  { key:"manual", label:"Venta manual", roles:["ADMIN"] },
  { key:"curva", label:"Curva diaria", roles:["ADMIN"] },
  { key:"analisis", label:"Análisis", roles:["ADMIN"] },
  { key:"comparativos", label:"Comparativos", roles:["ADMIN"] },
  { key:"cobro", label:"Base de cobro", roles:["ADMIN"] },
  { key:"cierre", label:"Cierre período", roles:["ADMIN"] },
  { key:"turnos", label:"Configuración de turnos", roles:["ADMIN"] }
];

const PUNTOS_BASE = [
  "DP (PLANTA)",
  "DM (MINA)",
  "CAP",
  "AÑAÑUCAS",
  "CF",
  "CAES",
  "DELIVERY CAES",
  "DELIVERY CF",
  "COMEDOR SATELITAL 1",
  "COMEDOR SATELITAL 2"
];

const EQUIPO_MAP = {
  "A":"DP (PLANTA)",
  "B":"DM (MINA)",
  "C":"CAP",
  "D":"AÑAÑUCAS",
  "E":"CF",
  "F":"CAES",
  "H":"DELIVERY CAES",
  "I":"DELIVERY CF",
  "J":"COMEDOR SATELITAL 1",
  "K":"COMEDOR SATELITAL 2"
};

const DEFAULT_DB = {
  ventaSupervisores: [],
  produccion: [],
  ventaSistema: [],
  ventaManual: [],
  curvaDiaria: [],
  cierresMensuales: [],
  maestros: {
    empresas: [],
    servicios: [
      "DESAYUNO",
      "ALMUERZO",
      "CENA",
      "CENA TRASNOCHE",
      "COLACION REFORZADA",
      "COLACION CORDILLERA",
      "COLACION TERRENO",
      "PERMUTA DESAYUNO",
      "PERMUTA ALMUERZO",
      "PERMUTA CENA",
      "PERMUTA CENA 24H",
      "PERMUTA CENA TRASNOCHE",
      "AGUAS 500CC",
      "BIDONES",
      "COFFEE STANDARD",
      "COFFEE PLUS",
      "COFFEE BASICO"
    ],
    puntosServicio: [...PUNTOS_BASE]
  }
};

const DEFAULT_SETTINGS = {
  perfil: "ADMIN",
  periodo: getCurrentMonth(),
  currentModule: "dashboard",
  filtroTurnoGlobal: "",
  agruparPermutas: true,
  analysisAxis: "empresa"
};

const DEFAULT_TURNOS = {
  fecha_inicio_ciclo: "",
  duracion_turno: 7,
  cantidad_turnos: 2,
  nombres_turnos: ["A","B"]
};

let db = structuredCloneSafe(DEFAULT_DB);
let settings = loadSettings();
let turnosConfig = loadTurnos();

let currentExport = {
  current: { headers:[], rows:[], filename:"export_actual" },
  detail: { headers:[], rows:[], filename:"export_detalle" }
};

const treeState = {
  supervisores: new Set(),
  produccion: new Set(),
  sistema: new Set(),
  manual: new Set(),
  curva: new Set(),
  analisis: new Set(),
  cobro: new Set()
};

const matrixFilters = {
  analisis: {
    empresa:"",
    servicio:"",
    punto_servicio:""
  }
};

let formEditing = {
  sup: null,
  prod: null,
  man: null,
  curva: null
};

/* =========================
   HELPERS
========================= */
function getCurrentMonth(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function structuredCloneSafe(obj){
  return JSON.parse(JSON.stringify(obj));
}

function normalizeText(v){
  return String(v || "").trim().replace(/\s+/g," ").toUpperCase();
}

function monthOf(fecha){
  return String(fecha || "").slice(0,7);
}

function inSelectedMonth(fecha){
  return monthOf(fecha) === settings.periodo;
}

function formatNumber(n){
  return new Intl.NumberFormat("es-CL", { maximumFractionDigits: 2 }).format(Number(n || 0));
}

function parseDateToISO(value){
  if(value === null || value === undefined || value === "") return "";

  if(typeof value === "number"){
    const d = XLSX.SSF.parse_date_code(value);
    if(d && d.y && d.m && d.d){
      return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
    }
  }

  const s = String(value).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  let m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;

  m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;

  return "";
}

function normalizeServiceFamily(servicio){
  const s = normalizeText(servicio);
  if(settings.agruparPermutas && s.includes("PERMUTA")) return "COLACION TERRENO";
  return s;
}

function ensureMasters(empresa, servicio){
  const e = normalizeText(empresa);
  const s = normalizeText(servicio);

  if(e && !db.maestros.empresas.includes(e)) db.maestros.empresas.push(e);
  if(s && !db.maestros.servicios.includes(s)) db.maestros.servicios.push(s);

  db.maestros.empresas.sort((a,b)=>a.localeCompare(b));
  db.maestros.servicios.sort((a,b)=>a.localeCompare(b));
}

function getHeaderValue(row, headerName){
  const key = Object.keys(row).find(k => normalizeText(k) === headerName);
  return key ? row[key] : "";
}

function setCurrentExport(headers, rows, filename, detailHeaders = null, detailRows = null, detailFilename = null){
  currentExport.current = { headers, rows, filename };
  currentExport.detail = {
    headers: detailHeaders || headers,
    rows: detailRows || rows,
    filename: detailFilename || `${filename}_detalle`
  };
}

/* =========================
   SETTINGS / TURNOS
========================= */
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
    if(!s) return structuredCloneSafe(DEFAULT_SETTINGS);
    return { ...DEFAULT_SETTINGS, ...s };
  }catch{
    return structuredCloneSafe(DEFAULT_SETTINGS);
  }
}

function saveSettings(){
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function loadTurnos(){
  try{
    const t = JSON.parse(localStorage.getItem(TURNOS_KEY) || "null");
    if(!t) return structuredCloneSafe(DEFAULT_TURNOS);
    return { ...DEFAULT_TURNOS, ...t };
  }catch{
    return structuredCloneSafe(DEFAULT_TURNOS);
  }
}

function saveTurnos(){
  localStorage.setItem(TURNOS_KEY, JSON.stringify(turnosConfig));
}

function getTurnoFecha(fechaISO){
  if(!turnosConfig.fecha_inicio_ciclo) return "";

  const start = new Date(turnosConfig.fecha_inicio_ciclo);
  const current = new Date(fechaISO);

  const diffDays = Math.floor((current - start) / (1000*60*60*24));
  if(diffDays < 0) return "";

  const cycleLength = turnosConfig.duracion_turno * turnosConfig.cantidad_turnos;
  const pos = diffDays % cycleLength;

  const turnoIndex = Math.floor(pos / turnosConfig.duracion_turno);
  return turnosConfig.nombres_turnos[turnoIndex] || "";
}

/* =========================
   INDEXEDDB
========================= */
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = e=>{
      const idb = e.target.result;
      if(!idb.objectStoreNames.contains(DB_STORE)){
        idb.createObjectStore(DB_STORE);
      }
    };

    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}

async function loadDB(){
  try{
    const idb = await openDB();
    const tx = idb.transaction(DB_STORE, "readonly");
    const store = tx.objectStore(DB_STORE);
    const req = store.get(DB_KEY);

    return await new Promise(resolve=>{
      req.onsuccess = ()=>{
        const data = req.result;
        if(!data){
          resolve(structuredCloneSafe(DEFAULT_DB));
        }else{
          resolve({ ...structuredCloneSafe(DEFAULT_DB), ...data });
        }
      };
      req.onerror = ()=> resolve(structuredCloneSafe(DEFAULT_DB));
    });
  }catch{
    return structuredCloneSafe(DEFAULT_DB);
  }
}

async function saveDB(){
  const idb = await openDB();
  const tx = idb.transaction(DB_STORE, "readwrite");
  const store = tx.objectStore(DB_STORE);
  store.put(db, DB_KEY);
}
  /* =========================
   DATOS / FILTROS / MENÚ
========================= */
function updateDatalists(){
  document.getElementById("empresasList").innerHTML =
    db.maestros.empresas.map(x=>`<option value="${x}"></option>`).join("");

  document.getElementById("serviciosList").innerHTML =
    db.maestros.servicios.map(x=>`<option value="${x}"></option>`).join("");
}

function updateTurnoSelector(){
  const sel = document.getElementById("turnoFiltroGlobal");
  const nombres = turnosConfig.nombres_turnos || [];
  sel.innerHTML = `<option value="">Todos</option>` + nombres.map(x=>`<option value="${x}">${x}</option>`).join("");
  sel.value = settings.filtroTurnoGlobal || "";
}

function getRowsPeriodo(rows){
  return rows.filter(r => monthOf(r.fecha) === settings.periodo);
}

function applyTurnoFilter(rows){
  if(!settings.filtroTurnoGlobal) return rows;
  return rows.filter(r => getTurnoFecha(r.fecha) === settings.filtroTurnoGlobal);
}

function getRealesPeriodo(){
  const sistema = getRowsPeriodo(db.ventaSistema).map(x=>({ ...x, origen:"SISTEMA" }));
  const manual = getRowsPeriodo(db.ventaManual).map(x=>({ ...x, origen:"MANUAL" }));
  return [...sistema, ...manual];
}

function getCurvaPeriodo(){
  return getRowsPeriodo(db.curvaDiaria);
}

function periodoCerrado(){
  return db.cierresMensuales.some(x => x.periodo === settings.periodo && x.estado === "CERRADO");
}

function validarPeriodoAbierto(){
  if(periodoCerrado()){
    alert(`El período ${settings.periodo} está cerrado.`);
    return false;
  }
  return true;
}

function upsertRecord(collection, payload){
  const idx = db[collection].findIndex(x => x.id === payload.id);
  if(idx >= 0) db[collection][idx] = payload;
  else db[collection].push(payload);
}

function deleteRecord(collection, id){
  db[collection] = db[collection].filter(x => x.id !== id);
}

function visibleMenuItems(){
  return MENU_ITEMS.filter(x => x.roles.includes(settings.perfil));
}

function renderMenu(){
  const nav = document.getElementById("menu");
  nav.innerHTML = "";

  visibleMenuItems().forEach(item => {
    const btn = document.createElement("button");
    btn.className =
      "w-full text-left px-4 py-3 rounded-xl font-semibold transition border " +
      (settings.currentModule === item.key
        ? "bg-white text-slate-900 border-white"
        : "bg-slate-900/70 border-slate-800 hover:bg-slate-800");

    btn.textContent = item.label;

    btn.onclick = ()=>{
      settings.currentModule = item.key;
      saveSettings();
      renderMenu();
      renderApp();
    };

    nav.appendChild(btn);
  });
}

function ensureAllowedModule(){
  const allowed = visibleMenuItems().map(x => x.key);
  if(!allowed.includes(settings.currentModule)){
    settings.currentModule = allowed[0];
    saveSettings();
  }
}

function updateTags(){
  document.getElementById("perfilTag").textContent =
    settings.perfil === "ADMIN" ? "ADMINISTRADOR" : "SUPERVISOR";

  document.getElementById("periodoTag").textContent = settings.periodo;
  document.getElementById("turnoTag").textContent = "TURNO: " + (settings.filtroTurnoGlobal || "TODOS");
}

function updateHeader(title, subtitle){
  document.getElementById("pageTitle").textContent = title;
  document.getElementById("pageSubtitle").textContent = subtitle;
  updateTags();
}

/* =========================
   EXPORTS
========================= */
function exportExcel(headers, rows, filename){
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Datos");
  XLSX.writeFile(wb, `${filename}.xlsx`);
}

function downloadCSVTemplate(filename, headers, sampleRows){
  const csv = [headers, ...sampleRows]
    .map(row => row.map(v => `"${String(v || "").replaceAll('"', '""')}"`).join(";"))
    .join("\n");

  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function validarColumnas(rows, requiredHeaders){
  if(!rows || !rows.length){
    return "El archivo no contiene filas.";
  }

  const headersArchivo = Object.keys(rows[0]).map(h => normalizeText(h));
  const faltantes = requiredHeaders.filter(h => !headersArchivo.includes(normalizeText(h)));

  if(faltantes.length){
    return "Faltan columnas obligatorias: " + faltantes.join(", ");
  }

  return "";
}

function exportPDF(headers, rows, filename){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"landscape" });

  doc.autoTable({
    head:[headers],
    body:rows
  });

  doc.save(`${filename}.pdf`);
}
  
function enviarCasoRacionesABitacora(row){
  const diferencia = Number(row.real || 0) - Number(row.curva || 0);
  const porcentaje = row.curva > 0 ? ((diferencia / row.curva) * 100) : 0;

  let semaforo = "Medio";
  if (Math.abs(porcentaje) >= 10 || row.curva === 0) semaforo = "Alto";
  if (Math.abs(porcentaje) < 5) semaforo = "Bajo";

  const titulo = `Desviación raciones - ${row.empresa} - ${row.servicio}`;

  const detalle =
`Fecha: ${row.fecha}
Empresa: ${row.empresa}
Servicio: ${row.servicio}
Sistema: ${row.sistema}
Manual: ${row.manual}
Real: ${row.real}
Curva: ${row.curva}
Diferencia: ${diferencia}
Desviación: ${porcentaje.toFixed(1)}%
Cobro calculado: ${row.cobro}

Caso generado desde módulo Control de Raciones.`;

  const nuevoCaso = {
    id: Date.now(),
    fecha: new Date().toISOString().slice(0, 10),
    titulo,
    detalle,
    responsable: "Augusto Urra",
    categoria: "Food",
    tipo: "Desviación operacional",
    empresa: row.empresa,
    fecha_compromiso: "",
    monto: "",
    edp: "No",
    estado: "Abierto",
    semaforo
  };

  const existentes = JSON.parse(localStorage.getItem("faena_bitacora_operativa") || "[]");

  localStorage.setItem(

function getSelectedDates(){
  const [year, month] = settings.periodo.split("-").map(Number);
  const days = new Date(year, month, 0).getDate();
  const out = [];
  for(let d=1; d<=days; d++){
    out.push(`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  }
  return out;
}

function getUniqueValues(rows, field){
  return [...new Set(rows.map(x => x[field]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b)));
}

function buildTree(rows, levels){
  const root = [];

  function find(children, label){
    let node = children.find(x => x.label === label);
    if(!node){
      node = { label, children: [], totalsByDate: {}, total: 0 };
      children.push(node);
    }
    return node;
  }

  rows.forEach(row => {
    let current = root;
    levels.forEach(level => {
      const label = row[level] || "SIN DATO";
      const node = find(current, label);
      node.totalsByDate[row.fecha] = (node.totalsByDate[row.fecha] || 0) + Number(row.cantidad || 0);
      node.total += Number(row.cantidad || 0);
      current = node.children;
    });
  });

  const sortNodes = nodes => {
    nodes.sort((a,b)=>a.label.localeCompare(b.label));
    nodes.forEach(n => sortNodes(n.children));
  };
  sortNodes(root);

  return root;
}

function flattenTree(nodes, moduleKey, level = 0, parent = ""){
  const out = [];
  nodes.forEach(node => {
    const path = parent ? `${parent}|||${node.label}` : node.label;
    const expanded = treeState[moduleKey]?.has(path) || false;

    out.push({
      ...node,
      path,
      level,
      expanded,
      hasChildren: node.children.length > 0
    });

    if(node.children.length && expanded){
      out.push(...flattenTree(node.children, moduleKey, level + 1, path));
    }
  });
  return out;
}

function expandAllTree(nodes, moduleKey, parent = ""){
  nodes.forEach(node => {
    const path = parent ? `${parent}|||${node.label}` : node.label;
    if(node.children.length){
      treeState[moduleKey].add(path);
      expandAllTree(node.children, moduleKey, path);
    }
  });
}

function buildDetailRows(rows, levels){
  return rows.slice().sort((a,b)=>{
    const aa = levels.map(k=>String(a[k] || "")).join("|") + "|" + a.fecha;
    const bb = levels.map(k=>String(b[k] || "")).join("|") + "|" + b.fecha;
    return aa.localeCompare(bb);
  }).map(r => [...levels.map(k => r[k] || ""), r.fecha, r.cantidad]);
}

function syncMatrixScrolls(topId, wrapId){
  const top = document.getElementById(topId);
  const wrap = document.getElementById(wrapId);
  if(!top || !wrap) return;

  let locked = false;

  top.addEventListener("scroll", () => {
    if(locked) return;
    locked = true;
    wrap.scrollLeft = top.scrollLeft;
    locked = false;
  });

  wrap.addEventListener("scroll", () => {
    if(locked) return;
    locked = true;
    top.scrollLeft = wrap.scrollLeft;
    locked = false;
  });
}

function renderMatrixTable(moduleKey, levels, rows, firstColumnLabel, filenameBase){
  const dates = getSelectedDates();
  const tree = buildTree(rows, levels);
  const flat = flattenTree(tree, moduleKey);

  setCurrentExport(
    [firstColumnLabel, ...dates, "Total"],
    flat.map(r => [`${"  ".repeat(r.level)}${r.label}`, ...dates.map(d => r.totalsByDate[d] || 0), r.total]),
    `${filenameBase}_${settings.periodo}_actual`,
    [...levels.map(x => x.toUpperCase()), "FECHA", "CANTIDAD"],
    buildDetailRows(rows, levels),
    `${filenameBase}_${settings.periodo}_detalle`
  );

  const topId = `top_${moduleKey}`;
  const wrapId = `wrap_${moduleKey}`;

  return `
    <div id="${topId}" class="matrix-top-scroll mb-2">
      <div style="width:${420 + dates.length * 120}px"></div>
    </div>

    <div id="${wrapId}" class="matrix-wrap">
      <table class="matrix">
        <thead>
          <tr>
            <th class="sticky-col">${firstColumnLabel}</th>
            ${dates.map(d => `<th class="text-right">${d}</th>`).join("")}
            <th class="text-right">Total</th>
          </tr>
        </thead>
        <tbody>
          ${
            flat.length
            ? flat.map(r => `
              <tr>
                <td class="sticky-col">
                  <div class="tree-cell">
                    <span style="display:inline-block;width:${r.level * 18}px"></span>
                    ${
                      r.hasChildren
                      ? `<button class="toggle-btn" data-tree-module="${moduleKey}" data-tree-path="${encodeURIComponent(r.path)}">${r.expanded ? "−" : "+"}</button>`
                      : `<span style="display:inline-block;width:24px"></span>`
                    }
                    <span class="${r.level===0 ? 'font-bold' : 'font-semibold'}">${r.label}</span>
                  </div>
                </td>
                ${dates.map(d => `<td class="text-right">${formatNumber(r.totalsByDate[d] || 0)}</td>`).join("")}
                <td class="text-right font-bold">${formatNumber(r.total)}</td>

            : `<tr><td colspan="${dates.length + 2}" class="p-0"><div class="empty">No hay información para el período seleccionado.</div></td></tr>`
          }
        </tbody>
      </table>
    </div>
  `;
}

function readWorkbookFile(file, callback){
  const reader = new FileReader();

  reader.onload = function(e){
    try{
      let workbook;

      if(file.name.toLowerCase().endsWith(".csv")){
        workbook = XLSX.read(e.target.result, {
          type: "string",
          FS: ";"
        });
      }else{
        workbook = XLSX.read(new Uint8Array(e.target.result), {
          type: "array"
        });
      }

      const sheet = workbook.Sheets[workbook.SheetNames[0]];

      const rows = XLSX.utils.sheet_to_json(sheet, {
        defval: "",
        raw: false
      });

      callback(null, rows);
    }catch(err){
      callback(err);
    }
  };

  if(file.name.toLowerCase().endsWith(".csv")){
    reader.readAsText(file, "windows-1252");
  }else{
    reader.readAsArrayBuffer(file);
  }
}

function parseImportedRows(rows, type){

  if(type === "simple"){
    rows.forEach(row => {

      const servicio = normalizeText(getHeaderValue(row,"SERVICIO"));
      const punto = normalizeText(getHeaderValue(row,"PUNTO_SERVICIO"));

      cantidad = Number(cantidad);

      out.push({
        id: `${Date.now()}_${Math.random()}`,

        servicio,
        familia: normalizeServiceFamily(servicio),
        punto_servicio: punto,
        cantidad
      });

  }

  return out;
}

function parseCurvaEECCRows(rows){
  const out = [];
  const [year, month] = settings.periodo.split("-").map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();

  rows.forEach(row => {
    const empresa = normalizeText(getHeaderValue(row, "EMPRESA"));
    const servicio = normalizeText(getHeaderValue(row, "SERVICIO"));
    if(!empresa || !servicio) return;

    for(let d=1; d<=daysInMonth; d++){
      const raw = getHeaderValue(row, String(d));
      let cantidad = raw;
      if(typeof cantidad === "string"){
        cantidad = cantidad.replace(/\./g,"").replace(",",".").trim();
      }
      if(cantidad === "" || cantidad === null || cantidad === undefined) continue;
      cantidad = Number(cantidad);
      if(Number.isNaN(cantidad)) continue;

      out.push({
        id: `${Date.now()}_${Math.random()}`,
        fecha: `${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`,
        empresa,
        servicio,
        familia: normalizeServiceFamily(servicio),
        cantidad
      });
    }
  });

  return out;
}

function analyzeAssistant(mode, prompt = ""){
  const rows = applyTurnoFilter(getRealesPeriodo());
  if(!rows.length) return "No hay datos para analizar en el período seleccionado.";

  if(mode === "promedio_dia"){
    const byDate = {};
    rows.forEach(r => byDate[r.fecha] = (byDate[r.fecha] || 0) + Number(r.cantidad || 0));
    const vals = Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
    const avg = vals.reduce((a,b)=>a+b[1],0) / vals.length;
    const max = vals.slice().sort((a,b)=>b[1]-a[1])[0];
    const min = vals.slice().sort((a,b)=>a[1]-b[1])[0];
    return `Promedio diario del período: ${formatNumber(avg)} raciones.\nDía más alto: ${max[0]} con ${formatNumber(max[1])}.\nDía más bajo: ${min[0]} con ${formatNumber(min[1])}.`;
  }

  if(mode === "por_casino"){
    const by = {};
    rows.forEach(r => by[r.punto_servicio] = (by[r.punto_servicio] || 0) + Number(r.cantidad || 0));
    const top = Object.entries(by).sort((a,b)=>b[1]-a[1]).slice(0,5);
    return "Top puntos de servicio del período:\n" + top.map((x,i)=>`${i+1}. ${x[0]}: ${formatNumber(x[1])}`).join("\n");
  }

  if(mode === "comparar_turnos"){
    const names = turnosConfig.nombres_turnos || [];
    if(names.length < 2) return "Configura al menos dos turnos para comparar.";

    const by = {};
    rows.forEach(r => {
      const t = getTurnoFecha(r.fecha) || "SIN TURNO";
      by[t] = (by[t] || 0) + Number(r.cantidad || 0);
    });

    return names.map(t => `${t}: ${formatNumber(by[t] || 0)} raciones`).join("\n");
  }

  if(mode === "anomalias"){
    const byDate = {};
    rows.forEach(r => byDate[r.fecha] = (byDate[r.fecha] || 0) + Number(r.cantidad || 0));
    const vals = Object.entries(byDate);
    const avg = vals.reduce((a,b)=>a+b[1],0) / Math.max(vals.length,1);
    const out = vals.filter(x => x[1] > avg * 1.25 || x[1] < avg * 0.75).sort((a,b)=>a[0].localeCompare(b[0]));
    return out.length
      ? "Días atípicos detectados:\n" + out.map(x => `${x[0]}: ${formatNumber(x[1])}`).join("\n")
      : "No se detectaron anomalías relevantes con la regla actual.";
  }

  const p = prompt.toLowerCase();
  if(p.includes("casino") || p.includes("punto")) return analyzeAssistant("por_casino");
  if(p.includes("promedio")) return analyzeAssistant("promedio_dia");
  if(p.includes("turno")) return analyzeAssistant("comparar_turnos");
  if(p.includes("anomal")) return analyzeAssistant("anomalias");

  return "No pude clasificar la consulta libre. Usa una consulta como: “promedio por día”, “comparar turnos”, “consumo por casino” o “detectar anomalías”.";
}

function bindCaptureModule({collectionName, prefix, showEmpresa = false, massiveType = ""}){
  const saveBtn = document.getElementById(`btn_${prefix}_guardar`);
  const clearBtn = document.getElementById(`btn_${prefix}_limpiar`);
  const importBtn = document.getElementById(`btn_${prefix}_import`);
  const plantillaBtn = document.getElementById(`btn_${prefix}_plantilla`);
  const notice = document.getElementById(`${prefix}_notice`);

plantillaBtn?.addEventListener("click", () => {
  downloadCSVTemplate(
    `${prefix}_plantilla.csv`,
    ["FECHA","SERVICIO","PUNTO_SERVICIO","CANTIDAD"],
    [
      ["2026-04-21","ALMUERZO","CAES","250"],
      ["2026-04-21","CENA","CAP","180"]
    ]
  );
});
  
  saveBtn?.addEventListener("click", async () => {
    if(!validarPeriodoAbierto()) return;

    const payload = {
      id: formEditing[prefix] || `${Date.now()}_${Math.random()}`,
      fecha: document.getElementById(`${prefix}_fecha`).value,
      servicio: normalizeText(document.getElementById(`${prefix}_servicio`).value),
      familia: normalizeServiceFamily(document.getElementById(`${prefix}_servicio`).value),
      punto_servicio: document.getElementById(`${prefix}_punto_servicio`).value,
      cantidad: Number(document.getElementById(`${prefix}_cantidad`).value || 0)
    };

    if(showEmpresa){
      payload.empresa = normalizeText(document.getElementById(`${prefix}_empresa`).value);
    }

    if(!payload.fecha || !payload.servicio || !payload.punto_servicio || Number.isNaN(payload.cantidad)){
      notice.innerHTML = `<div class="notice danger">Completa todos los campos.</div>`;
      return;
    }

    if(showEmpresa && !payload.empresa){
      notice.innerHTML = `<div class="notice danger">Ingresa empresa.</div>`;
      return;
    }

    upsertRecord(collectionName, payload);

    if(showEmpresa) ensureMasters(payload.empresa, payload.servicio);
    else ensureMasters("", payload.servicio);

    await saveDB();
    formEditing[prefix] = null;
    renderApp();
  });

  clearBtn?.addEventListener("click", () => {
    ["fecha","servicio","punto_servicio","cantidad","empresa"].forEach(k => {
      const el = document.getElementById(`${prefix}_${k}`);
      if(el){
        el.value = k === "punto_servicio" ? db.maestros.puntosServicio[0] : "";
      }
    });
    formEditing[prefix] = null;
    notice.innerHTML = "";
  });

  document.querySelectorAll(`[data-edit-${prefix}]`).forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset[`edit${prefix.charAt(0).toUpperCase()+prefix.slice(1)}`];
      const row = db[collectionName].find(x => x.id === id);
      if(!row) return;

      formEditing[prefix] = row.id;

      if(showEmpresa) document.getElementById(`${prefix}_empresa`).value = row.empresa || "";
      document.getElementById(`${prefix}_fecha`).value = row.fecha;
      document.getElementById(`${prefix}_servicio`).value = row.servicio;
      document.getElementById(`${prefix}_punto_servicio`).value = row.punto_servicio;
      document.getElementById(`${prefix}_cantidad`).value = row.cantidad;

      window.scrollTo({ top:0, behavior:"smooth" });
    });
  });

  document.querySelectorAll(`[data-del-${prefix}]`).forEach(btn => {
    btn.addEventListener("click", async () => {
      if(!validarPeriodoAbierto()) return;
      const id = btn.dataset[`del${prefix.charAt(0).toUpperCase()+prefix.slice(1)}`];
      deleteRecord(collectionName, id);
      await saveDB();
      renderApp();
    });
  });

  importBtn?.addEventListener("click", async () => {
    if(!validarPeriodoAbierto()) return;

    const file = document.getElementById(`${prefix}_file`).files[0];
    if(!file){
      notice.innerHTML = `<div class="notice danger">Selecciona un archivo.</div>`;
      return;
    }

    notice.innerHTML = `<div class="notice">Procesando archivo...</div>`;

    readWorkbookFile(file, async (err, rows) => {
      if(err){
        notice.innerHTML = `<div class="notice danger">${err.message}</div>`;
        return;
      }

const errorColumnas = validarColumnas(rows, ["FECHA","SERVICIO","PUNTO_SERVICIO","CANTIDAD"]);

if(errorColumnas){
  notice.innerHTML = `<div class="notice danger">${errorColumnas}</div>`;
  return;
}
      
      const imported = parseImportedRows(rows, massiveType);
      imported.forEach(r => {
        if(showEmpresa) ensureMasters(r.empresa, r.servicio);
        else ensureMasters("", r.servicio);
      });

      db[collectionName].push(...imported);
      await saveDB();

      notice.innerHTML = `<div class="notice success">Carga masiva completada: ${formatNumber(imported.length)} registros.</div>`;
      renderApp();
    });
  });
}

function filterConsumptionRows(rows, filters){
  return rows.filter(r => {
    if(filters.empresa && r.empresa !== filters.empresa) return false;
    if(filters.servicio && normalizeServiceFamily(r.servicio) !== filters.servicio) return false;
    if(filters.punto_servicio && r.punto_servicio !== filters.punto_servicio) return false;
    return true;
  });
}

function computeSupervisorVsRealRows(){
  const sup = applyTurnoFilter(getRowsPeriodo(db.ventaSupervisores));
  const real = applyTurnoFilter(getRealesPeriodo());

  const map = new Map();

  sup.forEach(r => {
    const key = `${r.fecha}|${r.punto_servicio}|${normalizeServiceFamily(r.servicio)}`;
    if(!map.has(key)){
      map.set(key,{
        fecha: r.fecha,
        punto_servicio: r.punto_servicio,
        servicio: normalizeServiceFamily(r.servicio),
        supervisor: 0,
        real: 0,
        diferencia: 0
      });
    }
    map.get(key).supervisor += Number(r.cantidad || 0);
  });

  real.forEach(r => {
    const key = `${r.fecha}|${r.punto_servicio}|${normalizeServiceFamily(r.servicio)}`;
    if(!map.has(key)){
      map.set(key,{
        fecha: r.fecha,
        punto_servicio: r.punto_servicio,
        servicio: normalizeServiceFamily(r.servicio),
        supervisor: 0,
        real: 0,
        diferencia: 0
      });
    }
    map.get(key).real += Number(r.cantidad || 0);
  });

  return [...map.values()]
    .map(x => ({ ...x, diferencia: x.supervisor - x.real }))
    .sort((a,b)=>(a.fecha+a.punto_servicio+a.servicio).localeCompare(b.fecha+b.punto_servicio+b.servicio));
}

function computeCobroDiarioRows(){
  const reales = applyTurnoFilter(getRealesPeriodo());
  const curva = applyTurnoFilter(getCurvaPeriodo());

  const map = new Map();

  reales.forEach(r => {
    const servicio = normalizeServiceFamily(r.servicio);
    const key = `${r.fecha}|${r.empresa}|${servicio}`;
    if(!map.has(key)){
      map.set(key,{
        fecha: r.fecha,
        empresa: r.empresa,
        servicio,
        sistema: 0,
        manual: 0,
        real: 0,
        curva: 0,
        cobro: 0
      });
    }

    const obj = map.get(key);
    if(r.origen === "SISTEMA") obj.sistema += Number(r.cantidad || 0);
    if(r.origen === "MANUAL") obj.manual += Number(r.cantidad || 0);
    obj.real += Number(r.cantidad || 0);
  });

  curva.forEach(r => {
    const servicio = normalizeServiceFamily(r.servicio);
    const key = `${r.fecha}|${r.empresa}|${servicio}`;
    if(!map.has(key)){
      map.set(key,{
        fecha: r.fecha,
        empresa: r.empresa,
        servicio,
        sistema: 0,
        manual: 0,
        real: 0,
        curva: 0,
        cobro: 0
      });
    }
    map.get(key).curva += Number(r.cantidad || 0);
  });

  return [...map.values()]
    .map(r => ({ ...r, cobro: Math.max(r.real, r.curva) }))
    .sort((a,b)=>(a.fecha+a.empresa+a.servicio).localeCompare(b.fecha+b.empresa+b.servicio));
}

      bindDashboardAI();
      break;

    case "supervisores":
      app.innerHTML = renderVentaSupervisores();
      bindCaptureModule({ collectionName:"ventaSupervisores", prefix:"sup", showEmpresa:false, massiveType:"simple" });
      break;

    case "produccion":
      app.innerHTML = renderProduccion();
      bindCaptureModule({ collectionName:"produccion", prefix:"prod", showEmpresa:false, massiveType:"simple" });
      break;

    case "sistema":
      app.innerHTML = renderVentaSistema();
      bindVentaSistemaEvents();
      break;

    case "manual":
      app.innerHTML = renderVentaManual();
      bindCaptureModule({ collectionName:"ventaManual", prefix:"man", showEmpresa:true, massiveType:"" });
      break;

    case "curva":
      app.innerHTML = renderCurva();
      bindCurva();
      break;

    case "analisis":
      app.innerHTML = renderAnalisis();
      bindAnalisis();
      break;

    case "comparativos":
  app.innerHTML = renderComparativos();

  document.querySelectorAll("[data-bitacora-raciones]").forEach(btn => {
    btn.addEventListener("click", () => {
      const row = JSON.parse(btn.dataset.bitacoraRaciones);
      enviarCasoRacionesABitacora(row);
    });
  });

  break;

    case "cobro":
      app.innerHTML = renderCobro();
      break;

    case "cierre":
      app.innerHTML = renderCierre();
      bindCierre();
      break;

    case "turnos":
      app.innerHTML = renderTurnos();
      bindTurnos();
      break;
  }

  bindTreeToggles();

  setTimeout(() => {
    ["supervisores","produccion","sistema","manual","curva","analisis"].forEach(key => {
      syncMatrixScrolls(`top_${key}`, `wrap_${key}`);
    });
  }, 0);

  document.getElementById("periodoSelector").value = settings.periodo;

  renderApp();

init();
</script>
